  .pill:hover { border-color: #999; }
  .pill.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .genre-filters { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }

  .song-list { display: flex; flex-direction: column; gap: 2px; max-height: 420px; overflow-y: auto; }
  .song { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 9px 12px; border-radius: 8px; background: #fafafa; border: 1px solid #eee; }
  .song-text { min-width: 0; flex: 1; }
  .song-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-meta { font-size: 11px; color: #888; }
  .badge { display: inline-block; padding: 3px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; white-space: nowrap; }
  .badge-c   { background: #fee2e2; color: #b91c1c; }
  .badge-free{ background: #dcfce7; color: #15803d; }
  .badge-cc  { background: #fef9c3; color: #a16207; }
  .badge-unk { background: #f0f0f0; color: #666; }

  .upload-zone:hover, .upload-zone.drag { border-color: #888; background: #f9f9f9; }
  .upload-zone .main-label { font-size: 14px; color: #555; margin-top: 8px; }
  .upload-zone .fmt-label { font-size: 11px; color: #aaa; margin-top: 5px; }
  .upload-zone .icon { font-size: 30px; }
  #file-input { display: none; }
  .result { border-radius: 10px; padding: 16px; margin-top: 14px; }
  .result-c   { background: #fee2e2; border: 1px solid #fca5a5; }
  .result-free{ background: #dcfce7; border: 1px solid #86efac; }
  .result-cc  { background: #fef9c3; border: 1px solid #fde047; }
  .result-unk { background: #f0f0f0; border: 1px solid #ddd; }
  .result-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .result-body  { font-size: 13px; line-height: 1.6; color: #333; }
  .result-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
  .result-item  { background: rgba(255,255,255,0.6); border-radius: 6px; padding: 8px 10px; }
  .result-item-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: #666; margin-bottom: 2px; }
  .result-item-val   { font-size: 13px; font-weight: 500; }
  .empty { text-align: center; padding: 24px; color: #aaa; font-size: 13px; }
  .count { font-size: 12px; color: #999; }
  .section-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
  .stats-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .stat { background: #f8f8f8; border: 1px solid #eee; border-radius: 8px; padding: 8px 14px; font-size: 12px; color: #555; }

  {title:"Aerials",artist:"System of a Down",year:2001,status:"copyrighted",genre:"Metal"},
];

const AUDIO_EXTS=['.mp3','.wav','.ogg','.flac','.aac','.m4a','.opus','.wma','.aiff','.aif'];
let filter='all', genreFilter='all', query='';

const GENRES=['Pop','Rock','Classic Rock','Hip-Hop','R&B','Electronic','Country','Classical','Jazz','Indie','Reggae','Latin','Metal','Creative Commons'];

function badge(s){
  if(s==='copyrighted') return '<span class="badge badge-c">Copyrighted</span>';
  if(s==='public') return '<span class="badge badge-free">Public Domain</span>';
  if(s==='cc') return '<span class="badge badge-cc">Creative Commons</span>';
  return '<span class="badge badge-unk">Unknown</span>';
}

function buildStats(){
  const c=SONGS.filter(s=>s.status==='copyrighted').length;
  const p=SONGS.filter(s=>s.status==='public').length;
  const cc=SONGS.filter(s=>s.status==='cc').length;
  document.getElementById('stats-row').innerHTML=
    `<div class="stat"><b>${SONGS.length}</b>Total Tracks</div>`+
    `<div class="stat"><b>${c}</b>Copyrighted</div>`+
    `<div class="stat"><b>${p}</b>Public Domain</div>`+
    `<div class="stat"><b>${cc}</b>Creative Commons</div>`;
}

function buildGenres(){
  const gf=document.getElementById('genre-filters');
  gf.innerHTML='<button class="gpill active" data-g="all">All Genres</button>'+
    GENRES.map(g=>`<button class="gpill" data-g="${g}">${g}</button>`).join('');
  gf.querySelectorAll('.gpill').forEach(p=>p.addEventListener('click',()=>{
    gf.querySelectorAll('.gpill').forEach(x=>x.classList.remove('active'));
    p.classList.add('active'); genreFilter=p.dataset.g; render();
  }));
}

function render(){
  const q=query.toLowerCase();
  const list=SONGS.filter(s=>{
    const mq=!q||
      s.title.toLowerCase().includes(q)||
      s.artist.toLowerCase().includes(q)||
      (s.genre&&s.genre.toLowerCase().includes(q))||
      String(s.year).includes(q);
    const mf=filter==='all'||(filter==='copyrighted'&&s.status==='copyrighted')||(filter==='public'&&s.status==='public')||(filter==='cc'&&s.status==='cc');
    const mg=genreFilter==='all'||s.genre===genreFilter;
    return mq&&mf&&mg;
  });
  document.getElementById('count').textContent=list.length+' tracks';
  const el=document.getElementById('song-list');
  if(!list.length){el.innerHTML='<div class="empty">No results found — try uploading the file below</div>';return;}
  el.innerHTML=list.map(s=>`
    <div class="song">
      <div class="song-text">
        <div class="song-name">${s.title}</div>
        <div class="song-meta">${s.artist} · ${s.year} · ${s.genre||''}</div>
      </div>
      ${badge(s.status)}
    </div>`).join('');
}

document.getElementById('search').addEventListener('input',e=>{query=e.target.value;render();});
document.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',()=>{
  document.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
  p.classList.add('active'); filter=p.dataset.f; render();
}));

buildStats(); buildGenres(); render();

// Upload
const zone=document.getElementById('zone');
zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('drag');});
zone.addEventListener('dragleave',()=>zone.classList.remove('drag'));
zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('drag');const f=e.dataTransfer.files[0];if(f)handle(f);});
document.getElementById('file-input').addEventListener('change',e=>{if(e.target.files[0])handle(e.target.files[0]);});

function getExt(n){return n.includes('.')?'.'+n.split('.').pop().toLowerCase():'';}
function isAudio(f){return AUDIO_EXTS.includes(getExt(f.name))||f.type.startsWith('audio/');}

// Strip extension and decode common filename patterns
function parseFilename(name){
  // Remove extension
  let base=name.replace(/\.[^.]+$/,'');
  // Decode URI encoding, replace underscores
  try{base=decodeURIComponent(base);}catch(e){}
  base=base.replace(/[_]+/g,' ').trim();

  // Pattern: "Artist - Title" or "Artist – Title"
  const sep=base.match(/\s[-–]\s/);
  if(sep){
    const parts=base.split(/\s[-–]\s/);
    if(parts.length>=2){
      // Could be Artist - Title or Track# Artist - Title
      const left=parts[0].replace(/^\d+[\s.]+/,'').trim();
      const right=parts.slice(1).join(' - ').trim();
      return{title:right,artist:left};
    }
  }
  // Pattern: "Title (Artist)" 
  const parens=base.match(/^(.+?)\s*\(([^)]+)\)\s*$/);
  if(parens) return{title:parens[1].trim(),artist:parens[2].trim()};

  // No pattern found — whole name is the title
  return{title:base.trim(),artist:'Unknown Artist'};
}

// Formats where jsmediatags can reliably read tags
const TAG_SUPPORTED=['.mp3','.mp4','.m4a','.aac','.ogg','.flac'];

function dbLookup(title,artist){
  const t=title.toLowerCase().trim(),a=(artist||'').toLowerCase().trim();
  let m=SONGS.find(s=>s.title.toLowerCase()===t);
  if(m) return m;
  if(a&&a!=='unknown artist'){
    m=SONGS.find(s=>s.title.toLowerCase().includes(t)&&s.artist.toLowerCase().includes(a));
    if(m) return m;
    m=SONGS.find(s=>s.artist.toLowerCase().includes(a)&&(s.title.toLowerCase().includes(t)||t.includes(s.title.toLowerCase().split(' ').slice(0,3).join(' '))));
    if(m) return m;
  }
  m=SONGS.find(s=>s.title.toLowerCase()===t||s.title.toLowerCase().includes(t)||t.includes(s.title.toLowerCase()));
  return m||null;
}

function handle(file){
  if(!isAudio(file)){showResult(null,'error',`"${file.name}" is not a supported audio file.`);return;}
  const area=document.getElementById('result-area');
  area.innerHTML='<div style="padding:14px;color:#666;font-size:13px">Reading metadata…</div>';
  const ext=getExt(file.name);
  const extLabel=(ext.replace('.','').toUpperCase())||'AUDIO';
  const parsed=parseFilename(file.name);

  function fallback(){
    showResult({title:parsed.title,artist:parsed.artist,year:'Unknown',album:'Unknown',ext:extLabel},null);
  }

  if(TAG_SUPPORTED.includes(ext)){
    // Set a timeout so we don't hang if jsmediatags stalls
    let done=false;
    const timer=setTimeout(()=>{if(!done){done=true;fallback();}},3000);
    try{
      jsmediatags.read(file,{
        onSuccess(tag){
          if(done) return; done=true; clearTimeout(timer);
          const t=tag.tags;
          showResult({
            title:t.title||parsed.title,
            artist:t.artist||parsed.artist,
            year:t.year||'Unknown',
            album:t.album||'Unknown',
            ext:extLabel
          },null);
        },
        onError(){if(done) return; done=true; clearTimeout(timer); fallback();}
      });
    }catch(e){if(!done){done=true;clearTimeout(timer);fallback();}}
  }else{
    // WAV, AIFF, WMA, OPUS — use filename parsing directly
    fallback();
  }
}

function showResult(meta,errType,errMsg){
  const area=document.getElementById('result-area');
  if(errType==='error'){area.innerHTML=`<div class="result result-unk"><div class="result-title">Unsupported File</div><div class="result-body">${errMsg}</div></div>`;return;}
  const{title,artist,year,album,ext}=meta;
  const match=dbLookup(title,artist);
  let cls,heading,body,owner,safe;
  if(match){
    if(match.status==='copyrighted'){
      cls='result-c';heading='Copyrighted';
      body=`"${match.title}" by ${match.artist} (${match.year}) is an actively copyrighted work. You need a license or explicit permission before any public use.`;
      owner=match.artist;safe='No — license required';
    }else if(match.status==='public'){
      cls='result-free';heading='Public Domain';
      body=`"${match.title}" by ${match.artist} (${match.year}) is in the public domain. You may use it freely, though note that specific recordings may still be protected.`;
      owner='Public Domain';safe='Yes — free to use';
    }else{
      cls='result-cc';heading='Creative Commons';
      body=`"${match.title}" by ${match.artist} is released under Creative Commons. Check the specific license terms for attribution, commercial use, or remix restrictions.`;
      owner=match.artist;safe='With attribution';
    }
  }else{
    cls='result-unk';heading='Not Found in Database';
    body=`"${title}" was not found. It may still be copyrighted — always verify ownership before using music you don't own. Try searching above or consult the rights holder.`;
    owner='Unknown';safe='Verify first';
  }
  area.innerHTML=`
    <div class="result ${cls}">
      <div class="result-title">${heading}</div>
      <div class="result-body">${body}</div>
      <div class="result-grid">
        <div class="result-item"><div class="result-item-label">Detected Title</div><div class="result-item-val">${title}</div></div>
        <div class="result-item"><div class="result-item-label">Artist</div><div class="result-item-val">${artist}</div></div>
        <div class="result-item"><div class="result-item-label">Owner / Label</div><div class="result-item-val">${owner}</div></div>
        <div class="result-item"><div class="result-item-label">Safe to Use</div><div class="result-item-val">${safe}</div></div>
        <div class="result-item"><div class="result-item-label">File Format</div><div class="result-item-val">${ext}</div></div>
        <div class="result-item"><div class="result-item-label">Year</div><div class="result-item-val">${year}</div></div>
      </div>
    </div>`;
}
</script>
